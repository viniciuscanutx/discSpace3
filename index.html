<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Explorer: Cosmic Vinyl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* ESTUFA DE VARIÁVEIS CÓSMICAS */
        :root {
            --cyan-neon: #00f3ff;
            --cyan-glow: rgba(0, 243, 255, 0.4);
            --deep-navy: #0a0b1a;
            --deep-purple: #1a0b2e;
            --orange-nebula: #ff6a00;
            --yellow-star: #ffea00;
            --dark-gray: #1a1a1a;
            --border-gray: #333333;
            --light-gray: #b0b0b0;
            --pixel-font: 'VT323', monospace;
            --hud-font: 'Press Start 2P', monospace;
            --text-font: 'Roboto Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes spaceScroll {
            0% { background-position: 0 0; }
            100% { background-position: -1000px 1000px; }
        }

        body {
            background-color: #000000;
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10 h2 v2 h-2 z M150 30 h1 v1 h-1 z M70 120 h2 v2 h-2 z M180 180 h1 v1 h-1 z M40 180 h1 v1 h-1 z' fill='%23ffffff' fill-opacity='0.2'/%3E%3C/svg%3E");
            background-size: 400px 400px;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            font-family: var(--pixel-font);
            animation: spaceScroll 90s linear infinite;
        }

        /* CONTAINER PRINCIPAL: 2 COLUNAS */
        #root {
            display: grid;
            grid-template-columns: 460px 1fr;
            width: 100vw;
            height: 100vh;
            padding: 40px;
            gap: 40px;
            position: relative;
        }

        /* ------- SEÇÃO 1: CREATION (ESQUERDA) ------- */
        .creation-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
            overflow-y: auto; /* Caso passe do tamanho da tela */
            padding-right: 8px;
        }

        /* Oculta scrollbar na creation section mantendo scrolável */
        .creation-section::-webkit-scrollbar { width: 6px; }
        .creation-section::-webkit-scrollbar-thumb { background: var(--border-gray); border-radius: 4px; }

        .section-header {
            font-family: var(--pixel-font);
            font-size: 42px;
            color: #fff;
            text-shadow: 2px 2px 0 var(--deep-purple), -1px -1px 0 var(--cyan-neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            user-select: none;
            margin-bottom: 8px;
        }

        /* Álbum Ativo & Busca */
        .active-album-box {
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid var(--border-gray);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: inset -1px -1px 0 rgba(0,0,0,0.5);
            position: relative;
        }

        .album-cover-pixel {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            border: 2px solid #000;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
            image-rendering: auto; 
        }

        .cover-fallback {
            background: linear-gradient(135deg, #c0c0c0 50%, #ffd700 50%);
            image-rendering: pixelated;
        }

        .album-info-creation {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        
        .album-info-title {
            font-family: var(--pixel-font);
            font-size: 26px;
            color: #fff;
            text-shadow: 1px 1px 0 #000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .album-info-artist {
            color: var(--cyan-neon);
            font-size: 14px;
            font-family: var(--text-font);
        }

        .album-info-date {
            color: var(--light-gray);
            font-size: 12px;
            font-family: var(--text-font);
        }

        .clear-selection-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            color: #888;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.1s;
            z-index: 20;
            user-select: none;
        }

        .clear-selection-btn:hover {
            color: #ff3333;
            transform: scale(1.2);
        }

        .search-input {
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--border-gray);
            color: var(--cyan-neon);
            font-family: var(--text-font);
            font-size: 12px;
            padding: 6px;
            width: 100%;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--cyan-neon);
        }

        .search-dropdown {
            position: absolute;
            top: 100%;
            left: -4px;
            right: -4px;
            background: #111;
            border: 4px solid var(--border-gray);
            border-top: none;
            z-index: 50;
            max-height: 200px;
            overflow-y: auto;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #333;
        }

        .search-result-item:hover {
            background: rgba(0, 243, 255, 0.1);
        }

        .search-result-cover { width: 40px; height: 40px; }

        /* A CAIXA EXCLUSIVA DE REVIEW (Neon Azul) */
        .review-input-container {
            flex: 1;
            min-height: 180px; 
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--border-gray);
            padding: 16px;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }
        .review-input-container:focus-within {
            border-color: #555;
            border-color: #fff;
        }

        .review-text-area {
            background: transparent;
            border: none;
            color: #fff;
            font-family: var(--text-font);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            flex: 1;
            outline: none;
        }

        .rating-container {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid var(--border-gray);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rating-label {
            font-family: var(--pixel-font);
            font-size: 18px;
            color: var(--light-gray);
        }

        .stars-selector {
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            letter-spacing: 4px;
            color: #fff;
        }

        .stars-selector span:hover {
            opacity: 0.7;
        }

        .status-report-container {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid var(--border-gray);
            padding: 16px;
        }

        .status-label {
            color: var(--light-gray);
            font-size: 20px;
            text-transform: uppercase;
            font-family: var(--pixel-font);
        }

        .status-input-row {
            display: flex;
            gap: 12px;
            align-items: stretch;
            height: 44px;
            margin-top: 14px;
        }

        .selected-icon-box {
            width: 44px;
            background: #000;
            border: 1px solid var(--border-gray);
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .sentiment-text-input {
            flex: 1;
            background: rgba(10,10,10,0.5);
            border: 1px solid var(--border-gray);
            padding: 0 12px;
            color: #fff;
            font-family: var(--pixel-font);
            font-size: 18px;
            text-transform: uppercase;
            outline: none;
        }

        .sentiment-text-input:focus {
            border-color: #fff;
        }

        .icon-picker-popup {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: #111;
            border: 1px solid var(--border-gray);
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: max-content;
            z-index: 100;
            margin-bottom: 8px;
        }

        .mini-icon {
            cursor: pointer;
            background: #222;
            border: 1px solid #444;
            padding: 8px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .mini-icon:hover, .mini-icon.active {
            border-color: #fff;
            background: #333;
        }

        .launch-btn {
            background: #111;
            border: 1px solid var(--border-gray);
            color: #fff;
            font-family: var(--pixel-font);
            font-size: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .launch-btn:hover {
            background: #fff;
            color: #000;
        }

        .chaos-section {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .chaos-header {
            text-align: right;
        }

        .chaos-space {
            flex: 1;
            position: relative;
        }

        .orbit-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px dotted rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05), inset 0 0 10px rgba(255, 255, 255, 0.05);
        }
        
        .orbit-1 { width: 400px; height: 400px; animation: spin 40s linear infinite; }
        .orbit-2 { width: 600px; height: 600px; animation: spin 60s linear infinite reverse; }

        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .active-post-spotlight {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.1);
            background: rgba(10, 10, 10, 0.94);
            border: 1px solid #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            padding: 24px;
            width: 450px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 20;
            overflow: hidden;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) scale(1.1) translateY(0); }
            50% { transform: translate(-50%, -50%) scale(1.1) translateY(-10px); }
        }

        .spotlight-header {
            display: flex;
            gap: 16px;
        }

        .spotlight-cover {
            width: 80px;
            height: 80px;
            background-size: cover;
            border: 1px solid #444;
            flex-shrink: 0;
        }

        .spotlight-title {
            font-family: var(--pixel-font);
            font-size: 28px;
            color: #fff;
        }

        .spotlight-artist {
            color: #fff;
            font-size: 20px;
        }

        .type-badge {
            font-family: var(--pixel-font);
            font-size: 14px;
            color: #aaa;
            margin-left: 12px;
            background: #111;
            border: 1px solid #333;
            padding: 2px 6px;
            vertical-align: middle;
        }

        .vinyl-record {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 160px;
            height: 160px;
            background: 
                radial-gradient(circle, #000 0%, #000 8%, transparent 8%),
                radial-gradient(circle, #222 8%, #111 28%, transparent 28%),
                repeating-radial-gradient(circle, #0a0a0a 0%, #0a0a0a 3px, #1a1a1a 4px, #0a0a0a 5px);
            border-radius: 50%;
            box-shadow: 0 0 0 1px #333, 0 0 30px rgba(255,255,255,0.02);
            z-index: 5;
            animation: spin-vinyl 4s linear infinite;
        }

        @keyframes spin-vinyl {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .spotlight-text {
            font-family: var(--text-font);
            font-size: 14px;
            color: #ddd;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
        }

        .spotlight-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed #444;
            padding-top: 12px;
        }

        .stars {
            color: var(--yellow-star);
            font-size: 18px;
            user-select: none;
        }

        .sentiment-badge {
            font-family: var(--pixel-font);
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--cyan-neon);
            color: var(--cyan-neon);
            padding: 4px 8px;
            font-size: 16px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Cards Flutuantes Caóticos */
        .floating-review {
            position: absolute;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            backdrop-filter: blur(2px);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .floating-review:hover {
            transform: scale(1.3) !important;
            border-color: #fff;
            z-index: 30;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .mini-cover {
            width: 36px;
            height: 36px;
            border: 1px solid #444;
            background-size: cover;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Perfil do Usuário */
        .user-profile {
            position: absolute;
            bottom: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.9);
            border: 4px solid var(--border-gray);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            width: 380px;
            z-index: 50;
        }

        .avatar-box {
            width: 64px;
            height: 64px;
            background: #222;
            border: 3px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        .profile-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-level {
            font-family: var(--pixel-font);
            color: #fff;
            font-size: 22px;
            text-transform: uppercase;
        }

        .xp-bar-wrapper {
            background: #111;
            border: 2px solid #444;
            height: 16px;
            position: relative;
            display: flex;
        }
        
        .xp-label {
            position: absolute;
            left: -30px;
            top: -2px;
            font-size: 16px;
            color: var(--yellow-star);
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6a00, #ffea00);
            border-right: 2px solid #fff;
            transition: width 0.5s ease-out;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Mantido exatamente 9 ícones para fechar o grid 3x3 perfeito sem espaços vazios
        const AVAILABLE_ICONS = ['✨','👽','🖤','💀','🚀','🎶','🔮','🔥','🧠'];

        // Card Flutuante Interativo
        const FloatingReview = ({ top, left, delay, review, onSelect }) => (
            <div 
                className="floating-review" 
                style={{ top, left, animation: `drift 10s infinite alternate ease-in-out ${delay}` }}
                onClick={() => onSelect(review)}
                title={review.album}
            >
                <div 
                    className="mini-cover" 
                    style={{ 
                        backgroundImage: review.coverUrl ? `url(${review.coverUrl})` : 'linear-gradient(45deg, #222, #555)' 
                    }}
                >
                    {!review.coverUrl && <span style={{fontSize: '12px'}}>{review.icon}</span>}
                </div>
                <div style={{ fontSize: '9px', color: '#ccc', marginTop: '4px', maxWidth: '40px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>@{review.username}</div>
                <style>{`
                    @keyframes drift { 0% { transform: translateY(0); } 100% { transform: translateY(-15px) rotate(3deg); } }
                `}</style>
            </div>
        );

        function SoundExplorer() {
            const [username, setUsername] = useState('AstroNauta_Br');
            
            const [selectedAlbum, setSelectedAlbum] = useState(null);
            const [reviewText, setReviewText] = useState("This album makes me feel like I'm floating on a dancefloor in Saturn. One More Time is a masterpiece.");
            const [customSentiment, setCustomSentiment] = useState('MELANCHOLY');
            const [selectedIcon, setSelectedIcon] = useState('👽');
            const [isIconPickerOpen, setIsIconPickerOpen] = useState(false);
            const [rating, setRating] = useState(5);

            // Busca de Álbuns na ITUNES API
            const [searchTerm, setSearchTerm] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [isSearching, setIsSearching] = useState(false);

            // Interface
            const searchTimeoutRef = useRef(null);
            
            // Post Ativo & Lista Caótica
            const mockData = [
                {
                    id: 1,
                    type: 'album',
                    album: 'In Rainbows',
                    artist: 'Radiohead',
                    text: 'Mergulho profundo na melancolia imersiva. Uma obra-prima de produção. Cuidado com o oxigênio! A transição rítmica em "15 Step" ainda quebra minha mente.',
                    sentiment: 'MELANCOLIA',
                    icon: '💧',
                    rating: 5,
                    username: 'GalacticVibe',
                    coverUrl: 'https://is1-ssl.mzstatic.com/image/thumb/Music115/v4/4a/4c/cb/4a4ccbb2-b67f-4b07-dded-d39b8b1effa6/191428135080.jpg/400x400cc.jpg',
                    xp: 45
                },
                {
                    id: 2,
                    type: 'track',
                    album: 'Nights',
                    collectionName: 'blonde.',
                    artist: 'Frank Ocean',
                    text: 'A batida dessa track viaja no espaço tempo em que estou agora. Som absurdo.',
                    sentiment: 'NOSTALGIA',
                    icon: '🚀',
                    rating: 5,
                    username: 'StarBoy_BR',
                    coverUrl: 'https://is1-ssl.mzstatic.com/image/thumb/Music125/v4/7f/8a/40/7f8a403d-946d-9f67-888e-5543494e3046/190758758131.jpg/400x400cc.jpg',
                    xp: 30
                }
            ];

            const [activePost, setActivePost] = useState(mockData[0]);

            const [chaosReviews, setChaosReviews] = useState([
               { id: 1, top: '10%', left: '15%', delay: '0s', review: mockData[0] },
               { id: 2, top: '70%', left: '40%', delay: '-2s', review: mockData[1] }
            ]);

            const [userXp, setUserXp] = useState(1);
            const [xpProgress, setXpProgress] = useState(20);

            // Busca na API da Apple Music (iTunes) sem apiKey!
            useEffect(() => {
                if (searchTerm.trim().length < 3) {
                    setSearchResults([]);
                    return;
                }

                if (searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                
                searchTimeoutRef.current = setTimeout(async () => {
                    setIsSearching(true);
                    try {
                        // Removido entity=album e adicionado media=music para retornar músicas (tracks) e álbuns
                        const url = `https://itunes.apple.com/search?term=${encodeURIComponent(searchTerm)}&media=music&limit=15`;
                        const response = await fetch(url);
                        const data = await response.json();
                        setSearchResults(data.results || []);
                    } catch (err) {
                        console.error('Falha na busca:', err);
                    } finally {
                        setIsSearching(false);
                    }
                }, 500);
                
            }, [searchTerm]);

            const selectAlbumFromSearch = (item) => {
                // Se trackName existir, é uma música, senão é um álbum
                setSelectedAlbum({
                    title: item.trackName || item.collectionName,
                    collectionName: item.collectionName,
                    artist: item.artistName,
                    coverUrl: item.artworkUrl100.replace('100x100', '400x400'),
                    type: item.wrapperType, // 'track' ou 'collection', deixei pronto no objeto pra você incluir a sua tag!
                    releaseDate: item.releaseDate ? item.releaseDate.substring(0,4) : ''
                });
                setSearchTerm('');
                setSearchResults([]);
            };

            const handleLaunch = () => {
                if(!selectedAlbum) return alert('Selecione uma música ou álbum antes de lançar!');
                if(!reviewText.trim()) return;

                const novoReview = {
                    type: selectedAlbum.type,
                    album: selectedAlbum.title,
                    collectionName: selectedAlbum.collectionName,
                    artist: selectedAlbum.artist,
                    coverUrl: selectedAlbum.coverUrl,
                    text: reviewText,
                    sentiment: customSentiment || '',
                    icon: selectedIcon,
                    rating: rating,
                    username: username,
                    xp: Math.floor(Math.random() * 50) + 10
                };

                setActivePost(novoReview);

                // Reset forms
                setSelectedAlbum(null);
                setSearchTerm('');
                setReviewText('');
                setCustomSentiment('MELANCHOLY');
                setSelectedIcon('👽');
                setRating(5);

                const newChaosItem = {
                    id: Date.now(),
                    top: (Math.random() * 70 + 5) + '%',
                    left: (Math.random() * 75 + 5) + '%',
                    delay: -(Math.random() * 10) + 's',
                    review: novoReview
                };

                setChaosReviews([...chaosReviews, newChaosItem]);

                // Update Level/XP
                let newProgress = xpProgress + novoReview.xp;
                if(newProgress >= 100) {
                    setUserXp(userXp + 1);
                    newProgress = newProgress - 100;
                }
                setXpProgress(newProgress);
            };

            const renderStars = (count) => {
                return "★".repeat(count) + "☆".repeat(5 - count);
            };

            return (
                <React.Fragment>
                    {/* SEÇÃO 1: CREATION */}
                    <div className="creation-section">
                        <div className="section-header">"Feeling"</div>
                        
                        {/* Box de Seleção de Álbum */}
                        <div className="active-album-box">
                            {selectedAlbum && (
                                <div 
                                    className="clear-selection-btn"
                                    onClick={() => setSelectedAlbum(null)}
                                    title="Remover Seleção"
                                >✖</div>
                            )}
                            <div 
                                className={`album-cover-pixel ${!selectedAlbum || !selectedAlbum.coverUrl ? 'cover-fallback' : ''}`}
                                style={selectedAlbum && selectedAlbum.coverUrl ? { backgroundImage: `url(${selectedAlbum.coverUrl})`} : {}}
                            ></div>
                            <div className="album-info-creation">
                                {selectedAlbum && (
                                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                                        <span className="album-info-title">{selectedAlbum.title}</span>
                                        {selectedAlbum.type === 'track' && selectedAlbum.collectionName && selectedAlbum.collectionName !== selectedAlbum.title && (
                                            <span style={{color: '#aaa', fontSize: '13px', fontFamily: 'var(--text-font)'}}>{selectedAlbum.collectionName}</span>
                                        )}
                                        <span className="album-info-artist">
                                            {selectedAlbum.artist}
                                            <span className="type-badge" style={{fontSize: '10px', padding: '1px 4px', marginLeft: '8px'}}>
                                                {selectedAlbum.type === 'track' ? '[MUSIC]' : '[ALBUM]'}
                                            </span>
                                        </span>
                                        <span className="album-info-date">{selectedAlbum.releaseDate}</span>
                                    </div>
                                )}
                                
                                <div style={{position: 'relative', marginTop: selectedAlbum ? '8px' : '0'}}>
                                    <input 
                                        className="search-input" 
                                        placeholder="Musica ou Album..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                    {isSearching && <div className="search-dropdown"><div style={{padding: '8px'}}>Buscando sinais...</div></div>}
                                    {searchResults.length > 0 && (
                                        <div className="search-dropdown">
                                            {searchResults.map(res => (
                                                <div className="search-result-item" key={res.trackId || res.collectionId} onClick={() => selectAlbumFromSearch(res)}>
                                                    <img src={res.artworkUrl100} className="search-result-cover" />
                                                    <div style={{flex: 1, overflow: 'hidden'}}>
                                                        <div style={{color: '#fff', fontSize: '14px', whiteSpace: 'nowrap', textOverflow: 'ellipsis', overflow: 'hidden'}}>{res.trackName || res.collectionName}</div>
                                                        <div style={{color: '#888', fontSize: '12px'}}>{res.artistName}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* CAIXA DE REVIEW */}
                        <div className="review-input-container">
                            <textarea 
                                className="review-text-area"
                                placeholder="Escreva a sua Review..." 
                                maxLength={300}
                                value={reviewText}
                                onChange={(e) => setReviewText(e.target.value)}
                            ></textarea>
                            <div style={{textAlign: 'right', fontSize: '15px', color: '#666', marginTop: '4px'}}>
                                {reviewText.length}/300
                            </div>
                        </div>

                        {/* DIV DA NOTA (RATING) */}
                        <div className="rating-container">
                            <span className="rating-label">RATING:</span>
                            <div className="stars-selector">
                                {[1, 2, 3, 4, 5].map((star) => (
                                    <span 
                                        key={star} 
                                        onClick={() => setRating(star)}
                                        style={{ color: star <= rating ? 'var(--yellow-star)' : '#444' }}
                                    >★</span>
                                ))}
                            </div>
                        </div>

                        {/* CAIXA DE STATUS REPORT (ÍCONE E SENTIMENTO) */}
                        <div className="status-report-container">
                            <span className="status-label">STATUS REPORT</span>
                            <div className="status-input-row" style={{position: 'relative'}}>
                                <div 
                                    className="selected-icon-box"
                                    style={{cursor: 'pointer'}}
                                    onClick={() => setIsIconPickerOpen(!isIconPickerOpen)}
                                >
                                    {selectedIcon}
                                </div>
                                {isIconPickerOpen && (
                                    <div className="icon-picker-popup">
                                        {AVAILABLE_ICONS.map(i => (
                                            <span 
                                                key={i} 
                                                className={`mini-icon ${selectedIcon === i ? 'active' : ''}`}
                                                onClick={() => {
                                                    setSelectedIcon(i);
                                                    setIsIconPickerOpen(false);
                                                }}
                                            >{i}</span>
                                        ))}
                                    </div>
                                )}
                                <input 
                                    className="sentiment-text-input" 
                                    type="text" 
                                    placeholder="SEU SENTIMENTO..."
                                    maxLength="20"
                                    value={customSentiment}
                                    onChange={(e) => setCustomSentiment(e.target.value)}
                                />
                            </div>
                        </div>

                        <button className="launch-btn" onClick={handleLaunch}>
                            LAUNCH INTO SPACE
                        </button>
                    </div>

                    {/* SEÇÃO 2: CHAOS SCROLL */}
                    <div className="chaos-section">

                        <div className="chaos-space">
                            <div className="vinyl-record"></div>
                            <div className="orbit-ring orbit-1"></div>
                            <div className="orbit-ring orbit-2"></div>

                            {/* Cards flutuantes no fundo */}
                            {chaosReviews.map(item => (
                                <FloatingReview 
                                    key={item.id} 
                                    top={item.top} 
                                    left={item.left} 
                                    delay={item.delay} 
                                    review={item.review} 
                                    onSelect={(rev) => setActivePost(rev)}
                                />
                            ))}

                            {/* O POST ATIVO */}
                            {activePost && (
                                <div className="active-post-spotlight">
                                    <div 
                                        style={{
                                            position: 'absolute',
                                            top: -20, bottom: -20, left: -20, right: -20,
                                            backgroundImage: activePost.coverUrl ? `url(${activePost.coverUrl})` : 'none',
                                            backgroundSize: 'cover',
                                            backgroundPosition: 'center',
                                            filter: 'blur(40px) grayscale(100%) brightness(0.15)',
                                            zIndex: -1
                                        }}
                                    ></div>
                                    <div 
                                        onClick={() => setActivePost(null)}
                                        style={{position: 'absolute', top: '8px', right: '12px', cursor: 'pointer', color: '#888', fontSize: '20px', userSelect: 'none'}}
                                        title="Close Review"
                                    >✖</div>
                                    <div className="spotlight-header">
                                        <div 
                                            className="spotlight-cover"
                                            style={activePost.coverUrl ? { backgroundImage: `url(${activePost.coverUrl})`} : { backgroundColor: '#222' }}
                                        ></div>
                                        <div style={{display: 'flex', flexDirection: 'column', gap: '4px', flex:1}}>
                                            <div className="spotlight-title">{activePost.album}</div>
                                            {activePost.type === 'track' && activePost.collectionName && activePost.collectionName !== activePost.album && (
                                                <div style={{color: '#aaa', fontSize: '14px', fontFamily: 'var(--text-font)'}}>{activePost.collectionName}</div>
                                            )}
                                            <div className="spotlight-artist">
                                                {activePost.artist}
                                                <span className="type-badge">
                                                    {activePost.type === 'track' ? '[MUSIC]' : '[ALBUM]'}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="spotlight-text" style={{ fontStyle: 'italic' }}>
                                        "{activePost.text}"
                                    </div>

                                    <div style={{ textAlign: 'right', color: 'var(--cyan-neon)', fontFamily: 'var(--pixel-font)', fontSize: '20px', letterSpacing: '1px' }}>
                                        @{activePost.username}
                                    </div>
                                    
                                    <div className="spotlight-footer">
                                        <div className="stars">{renderStars(activePost.rating)}</div>
                                        <div className="sentiment-badge">
                                            <span style={{fontSize:'20px'}}>{activePost.icon}</span> 
                                            {activePost.sentiment}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* PERFIL */}
                        <div className="user-profile">
                            <div className="avatar-box">🤺</div>
                            <div className="profile-details">
                                <div className="player-level">SOUND EXPLORER LV. {userXp}</div>
                                <div className="xp-bar-wrapper">
                                    <span className="xp-label">XP</span>
                                    <div className="xp-bar-fill" style={{ width: `${xpProgress}%` }}></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SoundExplorer />);
    </script>
</body>

</html>
